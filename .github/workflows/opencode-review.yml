name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Evita ejecutar el workflow si solo se tocan archivos de configuración o docs
    paths-ignore:
      - "**.md"
      - ".github/**"
      - "LICENSE"
      - ".gitignore"

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OpenCode Review
        uses: anomalyco/opencode/github@github-v1.2.24
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-pro
          use_github_token: true
          prompt: |
            Act as a Principal Frontend Architect reviewing a Pull Request for a pure React + Vite application that manages "Agnostic Planning Skills".

            Analyze the code diff carefully and provide feedback strictly based on these frontend priorities:

            1. SEPARATION OF CONCERNS & STATE MANAGEMENT (Highest Priority):
               - Ensure that planning logic, execution algorithms, and skill schemas are completely isolated from React UI components (JSX/TSX).
               - Check that pure logic is extracted into hooks, vanilla functions, or pure classes, keeping components purely presentation-driven.
               - Look for bad state management patterns (e.g., prop drilling, improper state syncing, or missing cleanup in useEffects).

            2. FRONTEND PERFORMANCE & LIFECYCLE:
               - Identify potential re-render bottlenecks caused by heavy planning operations or lack of memoization (useMemo/useCallback) where appropriate.
               - Ensure execution configurations, prompt structures, or heavy static schemas aren't being re-created inline on every render.

            3. CODE ROBUSTNESS & TYPES:
               - Ensure strict type definitions (or schema definitions) for skills, inputs, and outputs to prevent runtime crashes.
               - Look for proper handling of asynchronous processes (loading states, timeouts, and error boundaries for execution failures).

            CRITICAL INSTRUCTIONS:
            - Do NOT comment on minor stylistic preferences (linting, indentation) unless they directly impact runtime execution.
            - Do NOT apply heavy backend architecture principles (like DDD, repositories, or strict persistence logic). Focus purely on clean, decoupled, and performant client-side state/logic.
            - Group your comments by impact: [Critical Bug], [Architectural Flaw], or [Optimization].
