name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Evita ejecutar el workflow si solo se tocan archivos de configuración o docs
    paths-ignore:
      - "**.md"
      - ".github/**"
      - "LICENSE"
      - ".gitignore"

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OpenCode Review
        uses: anomalyco/opencode/github@github-v1.2.24
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-pro
          use_github_token: true
          prompt: |
            Act as a Principal Frontend Architect reviewing a Pull Request for "Nebula Ideas", a high-performance React + TypeScript + Vite website.

            Analyze the code diff carefully and provide feedback strictly based on these priorities:

            1. PERFORMANCE, RENDERING & EFFECTS (Highest Priority):
               - Ensure Three.js / WebGL constellation rendering is efficient, properly disposed of, and respects `prefers-reduced-motion`.
               - Check scroll reveal and animations for layout thrashing (avoiding synchronous layouts, DOM reads, scroll event listener clutter).
               - Avoid unnecessary re-computations (e.g., dynamic calculations inside component bodies instead of module-level constants or useMemo/useCallback).

            2. SEO, ACCESSIBILITY (a11y) & SEO METADATA:
               - Ensure dynamic metadata updates (Open Graph, Twitter Cards, dynamic titles, locales) are correct and decoupled from raw component logic.
               - Check structured JSON-LD schema blocks for validation errors or redundant values.
               - Maintain high semantic standards (semantic HTML5, ARIA roles, language toggles, keyboard usability).

            3. CLEAN ARCHITECTURE & LOCALIZATION:
               - Verify that localizations are cleanly managed in translations.ts without hardcoded copy in UI components.
               - Ensure DOM-mutating hooks (like meta/script injection) are properly modularized, parameterized, and cleaned up.

            4. TEST ROBUSTNESS, HYGIENE & PRESENCE:
               - Verify that appropriate unit or integration tests are present/added for any new hooks, components, or features introduced in the PR.
               - Ensure unit tests (Vitest + JSDOM) cleanly mock window/document states and clean up head/body modifications in beforeEach/afterEach hooks.

            CRITICAL INSTRUCTIONS:
            - Focus comments on [Critical Bug], [Architectural Flaw], or [Optimization].
            - Do NOT comment on minor formatting or styling unless it causes runtime degradation or layout breakage.
