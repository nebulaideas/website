name: CI Check

on:
  push:
    branches-ignore:
      - main
      - kimi-2
  pull_request:
    branches:
      - '**'

jobs:
  validate:
    name: Lint, Test, and Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests with Coverage
        run: npm run test:coverage

  rs-guard-smoke:
    name: rs-guard Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run rs-guard smoke test
        run: ./scripts/rs-guard-smoke.sh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
